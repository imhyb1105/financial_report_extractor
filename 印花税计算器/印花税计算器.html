<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印花税计算器 - 财税小工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../common/components/knowledge-base.css">
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">印花税计算器</h4>
                        <small>版本：2026.03-001 | 生效日期：2022-07-01</small>
                    </div>
                    <div class="card-body">
                        <form id="stampTaxForm">
                            <div class="mb-3">
                                <label class="form-label">应税凭证类型 <span class="text-danger">*</span></label>
                                <select class="form-select" id="contractType" required>
                                    <option value="">请选择</option>
                                    <option value="loan">借款合同 (0.05‰)</option>
                                    <option value="buy">买卖合同 (0.3‰)</option>
                                    <option value="lease_building">建筑安装工程承包合同 (0.3‰)</option>
                                    <option value="lease_property">财产租赁合同 (1‰)</option>
                                    <option value="transport">货物运输合同 (0.5‰)</option>
                                    <option value="warehouse">仓储保管合同 (1‰)</option>
                                    <option value="insurance">财产保险合同 (1‰)</option>
                                    <option value="tech">技术合同 (0.3‰)</option>
                                    <option value="transfer">产权转移书据 (0.5‰)</option>
                                    <option value="business">营业账簿 (0.25‰)</option>
                                    <option value="stock_trade">证券交易 (1‰)</option>
                                    <option value="land_right">土地使用权出让/转让 (0.5‰)</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">合同金额/计税金额 (元) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="contractAmount" placeholder="请输入金额" min="0" step="0.01" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">合同份数</label>
                                <input type="number" class="form-control" id="contractCopies" value="1" min="1" step="1">
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="fixedAmount" value="5">
                                <label class="form-check-label" for="fixedAmount">
                                    适用定额税率（5元/件，如其他营业账簿、权利许可证照）
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">计算印花税</button>
                        </form>

                        <div id="result" class="mt-4 d-none">
                            <div class="card bg-light">
                                <div class="card-header">
                                    <h5 class="mb-0">计算结果</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table table-bordered">
                                        <tbody>
                                            <tr>
                                                <th width="40%">应税凭证类型</th>
                                                <td id="resultType">-</td>
                                            </tr>
                                            <tr>
                                                <th>计税金额</th>
                                                <td id="resultAmount">-</td>
                                            </tr>
                                            <tr>
                                                <th>适用税率</th>
                                                <td id="resultRate">-</td>
                                            </tr>
                                            <tr>
                                                <th>应纳税额</th>
                                                <td id="resultTax" class="text-danger fw-bold">-</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <div class="mt-3">
                                        <h6>计算公式</h6>
                                        <div class="bg-white p-2 border rounded" id="formula">
                                            <code></code>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-muted">
                        <small>
                            <strong>政策依据：</strong>《中华人民共和国印花税法》<br>
                            <strong>注：</strong>证券交易印花税仅对出让方征收，受让方不纳税
                        </small>
                    </div>
                </div>

                <div class="card mt-3 shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">印花税税率表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>税目</th>
                                        <th>税率</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td>借款合同</td><td>0.05‰</td></tr>
                                    <tr><td>买卖合同</td><td>0.3‰</td></tr>
                                    <tr><td>建筑安装工程承包合同</td><td>0.3‰</td></tr>
                                    <tr><td>财产租赁合同</td><td>1‰</td></tr>
                                    <tr><td>货物运输合同</td><td>0.5‰</td></tr>
                                    <tr><td>仓储保管合同</td><td>1‰</td></tr>
                                    <tr><td>财产保险合同</td><td>1‰</td></tr>
                                    <tr><td>技术合同</td><td>0.3‰</td></tr>
                                    <tr><td>产权转移书据</td><td>0.5‰</td></tr>
                                    <tr><td>营业账簿</td><td>0.25‰</td></tr>
                                    <tr><td>证券交易</td><td>1‰</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 知识库组件 -->
                <div id="knowledgeBaseContainer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../common/components/knowledge-base.js"></script>
    <script src="script.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const kbContainer = document.getElementById('knowledgeBaseContainer');
        if (kbContainer && typeof KnowledgeBase !== 'undefined') {
          new KnowledgeBase(kbContainer, {
            knowledgePath: './印花税知识库/',
            items: [
              { title: '印花税基础知识', file: '1_印花税基础知识.md' },
              { title: '印花税税率', file: '2_印花税税率.md' },
              { title: '印花税规定', file: '3_印花税规定.md' },
              { title: '印花税计算方法', file: '4_印花税计算方法.md' }
            ]
          });
        }
      });
    </script>
</body>
</html>
