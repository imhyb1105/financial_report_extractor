<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城镇土地使用税计算器 - 财税小工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-teal text-white">
                        <h4 class="mb-0">城镇土地使用税计算器</h4>
                        <small>版本：2026.03-001 | 生效日期：2026-01-01</small>
                    </div>
                    <div class="card-body">
                        <form id="landUseTaxForm">
                            <div class="mb-3">
                                <label class="form-label">城市规模 <span class="text-danger">*</span></label>
                                <select class="form-select" id="cityTier" required>
                                    <option value="">请选择</option>
                                    <option value="large_city">大城市（50万人以上）：1.5-30元/㎡·年</option>
                                    <option value="medium_city">中等城市（20-50万人）：1.2-24元/㎡·年</option>
                                    <option value="small_city">小城市（20万人以下）：0.9-18元/㎡·年</option>
                                    <option value="town">县城、建制镇、工矿区：0.6-12元/㎡·年</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">土地面积（㎡） <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="landArea" placeholder="请输入计税土地面积" min="0" step="0.01" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">适用税额（元/㎡·年） <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="taxRate" placeholder="请输入当地适用税额" min="0" step="0.1" required>
                                <small class="text-muted">各省可在幅度内确定具体税额，请查询当地税务机关</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">计税期限</label>
                                <select class="form-select" id="taxPeriod">
                                    <option value="year">按年计算</option>
                                    <option value="month">按月计算</option>
                                    <option value="quarter">按季计算</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-teal w-100">计算城镇土地使用税</button>
                        </form>

                        <div id="result" class="mt-4 d-none">
                            <div class="card bg-light">
                                <div class="card-header">
                                    <h5 class="mb-0">计算结果</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table table-bordered">
                                        <tbody>
                                            <tr>
                                                <th width="40%">城市规模</th>
                                                <td id="resultTier">-</td>
                                            </tr>
                                            <tr>
                                                <th>土地面积</th>
                                                <td id="resultArea">-</td>
                                            </tr>
                                            <tr>
                                                <th>适用税额</th>
                                                <td id="resultRate">-</td>
                                            </tr>
                                            <tr>
                                                <th>年应纳税额</th>
                                                <td id="resultYearTax">-</td>
                                            </tr>
                                            <tr>
                                                <th>应纳税额</th>
                                                <td id="resultTax" class="text-danger fw-bold">-</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <div class="mt-3">
                                        <h6>计算公式</h6>
                                        <div class="bg-white p-2 border rounded" id="formula">
                                            <code></code>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-muted">
                        <small>
                            <strong>政策依据：</strong>《中华人民共和国城镇土地使用税暂行条例》<br>
                            <strong>注：</strong>各省可在国家基准税额幅度内确定具体适用税额
                        </small>
                    </div>
                </div>

                <div class="card mt-3 shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">城镇土地使用税税额幅度表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>级别</th>
                                        <th>人口规模</th>
                                        <th>年税额（元/㎡）</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td>大城市</td><td>50万以上</td><td>1.5-30</td></tr>
                                    <tr><td>中等城市</td><td>20-50万</td><td>1.2-24</td></tr>
                                    <tr><td>小城市</td><td>20万以下</td><td>0.9-18</td></tr>
                                    <tr><td>县城、建制镇、工矿区</td><td>-</td><td>0.6-12</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <a href="城镇土地使用税知识库/0_索引.md" class="btn btn-outline-secondary btn-sm" target="_blank">查看知识库</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
