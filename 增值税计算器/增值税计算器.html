<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>增值税计算器</title>
  <link rel="stylesheet" href="../common/styles.css">
  <link rel="stylesheet" href="../common/components/knowledge-base.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="mb-3">增值税计算器</h1>
    <div class="status-bar small mb-2">
      <span>税率版本：<strong id="vatVersionTop">—</strong></span>
      <span>生效日期：<strong id="vatEffectiveDateTop">—</strong></span>
    </div>
    <div id="errors" class="errors" aria-live="polite"></div>

    <ul class="nav nav-tabs" id="tabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="general-tab" data-bs-toggle="tab" data-bs-target="#general" type="button" role="tab">一般纳税人</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="small-tab" data-bs-toggle="tab" data-bs-target="#small" type="button" role="tab">小规模纳税人</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="mixed-tab" data-bs-toggle="tab" data-bs-target="#mixed" type="button" role="tab">兼营/多税率合并工具</button>
      </li>
    </ul>

    <div class="tab-content pt-3">
      <!-- 一般纳税人 -->
      <div class="tab-pane fade show active" id="general" role="tabpanel">
        <div class="card">
          <div class="card-body">

            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">销售额（元）</label>
                <input type="number" class="form-control" id="generalSales" min="0" step="0.01" placeholder="请输入销售额">
              </div>
              <div class="col-md-4">
                <label class="form-label">是否含税</label><br>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="generalTaxIncluded" id="generalTaxIncluded1" value="1" checked>
                  <label class="form-check-label" for="generalTaxIncluded1">含税</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="generalTaxIncluded" id="generalTaxIncluded2" value="0">
                  <label class="form-check-label" for="generalTaxIncluded2">不含税</label>
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label">税目</label>
                <select class="form-select" id="generalTaxItem">
                  <optgroup label="货物/加工修理修配劳务（13%）">
                    <option value="goods" selected>通用货物/加工修理修配劳务（13%）</option>
                    <option value="manufacturing">制造业产品（13%）</option>
                    <option value="electricity">电力/燃气/水供应（13%）</option>
                  </optgroup>
                  <optgroup label="交通运输/建筑/不动产租赁（9%）">
                    <option value="road_transport">道路运输（9%）</option>
                    <option value="construction">建筑服务（9%）</option>
                    <option value="real_estate_lease">不动产租赁（9%）</option>
                    <option value="agriculture">农产品销售（9%）</option>
                  </optgroup>
                  <optgroup label="现代服务（6%）">
                    <option value="rd_service">研发和技术服务（6%）</option>
                    <option value="it_service">信息技术服务（6%）</option>
                    <option value="financial_service">金融服务（6%）</option>
                    <option value="life_service">生活服务（6%）</option>
                    <option value="services">通用现代服务（6%）</option>
                  </optgroup>
                  <optgroup label="出口/零税率（0%）">
                    <option value="export_zero">出口/零税率（0%）</option>
                  </optgroup>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">适用税率</label>
                <select class="form-select" id="generalTaxRate">
                  <option value="0.13">13%</option>
                  <option value="0.09">9%</option>
                  <option value="0.06">6%</option>
                  <option value="0.00">0%</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">进项税额（元）</label>
                <input type="number" class="form-control" id="generalInputTax" min="0" step="0.01" placeholder="请输入进项税额">
              </div>
            </div>

            <hr>
            <!-- 差额征税小面板 -->
            <div class="border rounded p-3 bg-white">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                  <strong>差额征税（可选）</strong>
                  <span class="text-muted small ms-2">启用后自动按税率扣除相关项目</span>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="diffEnabled">
                  <label class="form-check-label" for="diffEnabled">启用</label>
                </div>
              </div>

              <div class="row g-3 align-items-end">
                <div class="col-md-4">
                  <label class="form-label">快速录入扣除金额（元）</label>
                  <input type="number" class="form-control" id="diffAmount" min="0" step="0.01" placeholder="可选：单笔扣除">
                </div>
                <div class="col-md-4">
                  <label class="form-label">是否含税</label><br>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="diffIncluded" id="diffIncluded1" value="1" checked>
                    <label class="form-check-label" for="diffIncluded1">含税</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="diffIncluded" id="diffIncluded2" value="0">
                    <label class="form-check-label" for="diffIncluded2">不含税</label>
                  </div>
                </div>
              </div>

              <div class="mt-3">
                <div class="d-flex justify-content-between align-items-center">
                  <strong>扣除项目明细列表</strong>
                  <button type="button" class="btn btn-outline-secondary btn-sm" id="diffAddRowBtn">添加扣除项</button>
                </div>
                <div id="diffItemsContainer" class="mt-2"></div>
                <div class="form-text">可添加多条扣除项；含税金额将按适用税率自动换算为不含税。</div>
                <div class="mt-2 small text-muted" id="diffTotalText">当前扣除不含税合计（含快速录入）：0.00 元</div>
              </div>

              <div id="diffDetails" class="mt-3" style="display:none;">
                <div class="alert alert-secondary py-2 mb-2">差额扣除计算明细</div>
                <table class="table table-sm">
                  <thead>
                    <tr>
                      <th>项目名称</th>
                      <th>原金额</th>
                      <th>是否含税</th>
                      <th>换算不含税金额</th>
                      <th>转换税率</th>
                    </tr>
                  </thead>
                  <tbody id="diffDetailsBody"></tbody>
                </table>
              </div>
            </div>

            <div class="mt-3">
              <button class="btn btn-primary" id="generalCalculateBtn">计算</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 小规模纳税人 -->
      <div class="tab-pane fade" id="small" role="tabpanel">
        <div class="card">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">销售额（元）</label>
                <input type="number" class="form-control" id="smallSales" min="0" step="0.01" placeholder="请输入销售额">
              </div>
              <div class="col-md-4">
                <label class="form-label">是否含税</label><br>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="smallTaxIncluded" id="smallTaxIncluded1" value="1" checked>
                  <label class="form-check-label" for="smallTaxIncluded1">含税</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="smallTaxIncluded" id="smallTaxIncluded2" value="0">
                  <label class="form-check-label" for="smallTaxIncluded2">不含税</label>
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label">税目（说明项）</label>
                <select class="form-select" id="smallTaxItem">
                  <option value="goods" selected>通用货物/加工修理修配劳务</option>
                  <option value="manufacturing">制造业产品</option>
                  <option value="electricity">电力/燃气/水供应</option>
                  <option value="road_transport">道路运输</option>
                  <option value="construction">建筑服务</option>
                  <option value="real_estate_lease">不动产租赁</option>
                  <option value="agriculture">农产品销售</option>
                  <option value="rd_service">研发和技术服务</option>
                  <option value="it_service">信息技术服务</option>
                  <option value="financial_service">金融服务</option>
                  <option value="life_service">生活服务</option>
                  <option value="services">通用现代服务</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">征收率</label>
                <select class="form-select" id="smallTaxRate">
                  <option value="0.05">5%（出售不动产）</option>
                  <option value="0.03" selected>3%</option>
                  <option value="0.01">1%（阶段性至2027-12-31）</option>
                  <option value="0.00">0%</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">本季度累计不含税销售额（元，可选）</label>
                <input type="number" class="form-control" id="smallQuarterTotal" min="0" step="0.01" placeholder="用于30万元免税判定（不含税）">
              </div>
              <div class="col-md-4 d-flex align-items-end">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="smallWaiveExemption">
                  <label class="form-check-label" for="smallWaiveExemption">放弃免税并计税</label>
                </div>
              </div>
            </div>

            <div class="mt-3">
              <button class="btn btn-primary" id="smallCalculateBtn">计算</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 混合销售工具 -->
      <div class="tab-pane fade" id="mixed" role="tabpanel">
        <div class="card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <strong>兼营/多税率项目</strong>
              <button type="button" class="btn btn-outline-secondary btn-sm" id="mixedAddRowBtn">添加项目</button>
            </div>
            <div id="mixedItemsContainer" class="mb-2"></div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">计算模式</label><br>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="mixedMode" id="mixedModeSeparate" checked>
                  <label class="form-check-label" for="mixedModeSeparate">分别核算</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="mixedMode" id="mixedModeHighest">
                  <label class="form-check-label" for="mixedModeHighest">不能分别核算（从高适用税率）</label>
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label">合并进项税额（元）</label>
                <input type="number" class="form-control" id="mixedInputTax" min="0" step="0.01" placeholder="可选：用于合并抵扣">
              </div>
            </div>

            <div class="mt-3">
              <button class="btn btn-primary" id="mixedCalculateBtn">合并计算</button>
            </div>

            <div id="mixedDetails" class="mt-3" style="display:none;">
              <div class="alert alert-secondary py-2 mb-2">各项目计算明细</div>
              <table class="table table-sm">
                <thead>
                  <tr>
                    <th>税目</th>
                    <th>不含税销售额</th>
                    <th>税率</th>
                    <th>销项税额</th>
                    <th>进项税额</th>
                    <th>净税负</th>
                  </tr>
                </thead>
                <tbody id="mixedDetailsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 结果展示区 -->
    <div class="card mt-4" id="resultCard" style="display:none;">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <div class="alert alert-light border">不含税销售额：<strong id="resultSalesWithoutTax">0.00</strong> 元</div>
          </div>
          <div class="col-md-4">
            <div class="alert alert-light border">销项税额：<strong id="resultOutputTax">0.00</strong> 元</div>
          </div>
          <div class="col-md-4" id="resultInputTaxItem" style="display:none;">
            <div class="alert alert-light border">进项税额：<strong id="resultInputTax">0.00</strong> 元</div>
          </div>
        </div>
        <div class="alert alert-light border mt-2">应纳税额：<strong id="resultTaxPayable">0.00</strong> 元</div>
        <div class="d-flex gap-2 mb-2">
          <button id="btnCopyVATResult" type="button" class="btn btn-outline-secondary btn-sm">复制结果</button>
          <button id="btnExportVATPDF" type="button" class="btn btn-outline-secondary btn-sm">导出PDF</button>
        </div>
        <div id="resultNote" class="alert alert-info mt-3">说明与政策依据</div>
        <div id="resultBreakdown" class="breakdown"></div>
      </div>
    </div>

    <!-- 知识库与合规说明 -->
    <div id="knowledgeBaseContainer"></div>

    <footer class="mt-3">
      <p>当前版本：<span id="vatVersion">—</span>，生效日期：<span id="vatEffectiveDate">—</span></p>
      <p class="text-muted small">知识库与计算结果仅供参考，以最新政策为准。</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../common/components/knowledge-base.js"></script>
  <script src="../common/components/utils.js"></script>
  <script src="../common/components/version.js"></script>
  <script src="../common/components/export.js"></script>
  <script src="./script.js"></script>
  <script>
    // 初始化知识库组件
    document.addEventListener('DOMContentLoaded', function() {
      const kbContainer = document.getElementById('knowledgeBaseContainer');
      if (kbContainer && typeof KnowledgeBase !== 'undefined') {
        new KnowledgeBase(kbContainer, {
          knowledgePath: './增值税知识库/',
          items: [
            { title: '增值税基础知识', file: '1_增值税基础知识.md' },
            { title: '增值税税率', file: '2_增值税税率.md' },
            { title: '增值税规定', file: '3_增值税规定.md' },
            { title: '增值税计算方法', file: '4_增值税计算方法.md' },
            { title: '纳税调整详解', file: '5_纳税调整详解.md' }
          ]
        });
      }
    });
  </script>
</body>
</html>
