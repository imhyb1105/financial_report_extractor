<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房产税计算器 - 财税小工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../common/components/knowledge-base.css">
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">
                        <h4 class="mb-0">房产税计算器</h4>
                        <small>版本：2026.03-001 | 生效日期：2026-01-01</small>
                    </div>
                    <div class="card-body">
                        <ul class="nav nav-tabs mb-3" id="calcTabs">
                            <li class="nav-item">
                                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#fromValue">从价计征</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#fromRent">从租计征</button>
                            </li>
                        </ul>

                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="fromValue">
                                <form id="fromValueForm">
                                    <div class="mb-3">
                                        <label class="form-label">房产原值（元） <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="propertyValue" placeholder="请输入房产原值" min="0" step="0.01" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">扣除比例（%）</label>
                                        <input type="number" class="form-control" id="deductionRate" value="30" min="0" max="100" step="1">
                                        <small class="text-muted">一般按房产原值的10%-30%扣除，具体以当地规定为准</small>
                                    </div>

                                    <div class="alert alert-info">
                                        <small>
                                            <strong>从价计征公式：</strong><br>
                                            年应纳税额 = 房产原值 × (1 - 扣除比例) × 1.2%
                                        </small>
                                    </div>

                                    <button type="submit" class="btn btn-secondary w-100">计算房产税</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="fromRent">
                                <form id="fromRentForm">
                                    <div class="mb-3">
                                        <label class="form-label">年租金收入（元） <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="rentIncome" placeholder="请输入年租金收入" min="0" step="0.01" required>
                                    </div>

                                    <div class="alert alert-info">
                                        <small>
                                            <strong>从租计征公式：</strong><br>
                                            年应纳税额 = 年租金收入 × 12%
                                        </small>
                                    </div>

                                    <button type="submit" class="btn btn-secondary w-100">计算房产税</button>
                                </form>
                            </div>
                        </div>

                        <div id="result" class="mt-4 d-none">
                            <div class="card bg-light">
                                <div class="card-header">
                                    <h5 class="mb-0">计算结果</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table table-bordered">
                                        <tbody>
                                            <tr>
                                                <th width="40%">计征方式</th>
                                                <td id="resultType">-</td>
                                            </tr>
                                            <tr>
                                                <th>计税依据</th>
                                                <td id="resultBasis">-</td>
                                            </tr>
                                            <tr>
                                                <th>适用税率</th>
                                                <td id="resultRate">-</td>
                                            </tr>
                                            <tr>
                                                <th>年应纳税额</th>
                                                <td id="resultTax" class="text-danger fw-bold">-</td>
                                            </tr>
                                            <tr>
                                                <th>月应纳税额</th>
                                                <td id="resultMonthlyTax">-</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <div class="mt-3">
                                        <h6>计算公式</h6>
                                        <div class="bg-white p-2 border rounded" id="formula">
                                            <code></code>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-muted">
                        <small>
                            <strong>政策依据：</strong>《中华人民共和国房产税暂行条例》<br>
                            <strong>注：</strong>个人所有非营业用的房产免征房产税
                        </small>
                    </div>
                </div>

                <div class="card mt-3 shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">房产税税率表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>计征方式</th>
                                        <th>税率</th>
                                        <th>适用情形</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td>从价计征</td><td>1.2%</td><td>自用房产</td></tr>
                                    <tr><td>从租计征</td><td>12%</td><td>出租房产</td></tr>
                                    <tr><td>从租计征（个人出租住房）</td><td>4%</td><td>个人出租住房</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 知识库组件 -->
                <div id="knowledgeBaseContainer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../common/components/knowledge-base.js"></script>
    <script src="script.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const kbContainer = document.getElementById('knowledgeBaseContainer');
        if (kbContainer && typeof KnowledgeBase !== 'undefined') {
          new KnowledgeBase(kbContainer, {
            knowledgePath: './房产税知识库/',
            items: [
              { title: '房产税基础知识', file: '1_房产税基础知识.md' },
              { title: '房产税税率', file: '2_房产税税率.md' },
              { title: '房产税规定', file: '3_房产税规定.md' },
              { title: '房产税计算方法', file: '4_房产税计算方法.md' }
            ]
          });
        }
      });
    </script>
</body>
</html>
