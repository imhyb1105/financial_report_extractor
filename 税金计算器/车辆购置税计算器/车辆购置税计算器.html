<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆购置税计算器 - 财税小工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../common/components/knowledge-base.css">
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0">车辆购置税计算器</h4>
                        <small>版本：2026.03-001 | 生效日期：2019-07-01</small>
                    </div>
                    <div class="card-body">
                        <form id="vehiclePurchaseTaxForm">
                            <div class="mb-3">
                                <label class="form-label">车辆类型 <span class="text-danger">*</span></label>
                                <select class="form-select" id="vehicleType" required>
                                    <option value="">请选择</option>
                                    <option value="fuel">燃油汽车（10%）</option>
                                    <option value="new_energy_2024_2025">新能源汽车（2024-2025年，免征）</option>
                                    <option value="new_energy_2026_2027">新能源汽车（2026-2027年，5%）</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">车辆价格（不含增值税）/元 <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="vehiclePrice" placeholder="请输入车辆价格（不含税）" min="0" step="0.01" required>
                                <small class="text-muted">如只有含税价，请先除以1.13换算为不含税价</small>
                            </div>

                            <div class="mb-3" id="taxCapGroup" style="display:none;">
                                <label class="form-label">减免税限额（元）</label>
                                <input type="number" class="form-control" id="taxCap" value="0" min="0" step="0.01" readonly>
                                <small class="text-muted" id="taxCapNote"></small>
                            </div>

                            <div class="alert alert-info">
                                <small>
                                    <strong>说明：</strong><br>
                                    • 燃油汽车：按10%税率计征<br>
                                    • 新能源汽车2024-2025年：免征（每辆减免额不超过3万元）<br>
                                    • 新能源汽车2026-2027年：减按5%征收（每辆减免额不超过1.5万元）
                                </small>
                            </div>

                            <button type="submit" class="btn btn-warning w-100">计算车辆购置税</button>
                        </form>

                        <div id="result" class="mt-4 d-none">
                            <div class="card bg-light">
                                <div class="card-header">
                                    <h5 class="mb-0">计算结果</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table table-bordered">
                                        <tbody>
                                            <tr>
                                                <th width="40%">车辆类型</th>
                                                <td id="resultType">-</td>
                                            </tr>
                                            <tr>
                                                <th>计税价格</th>
                                                <td id="resultPrice">-</td>
                                            </tr>
                                            <tr>
                                                <th>适用税率</th>
                                                <td id="resultRate">-</td>
                                            </tr>
                                            <tr>
                                                <th>减免税额</th>
                                                <td id="resultDeduction">-</td>
                                            </tr>
                                            <tr>
                                                <th>应纳税额</th>
                                                <td id="resultTax" class="text-danger fw-bold">-</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <div class="mt-3">
                                        <h6>计算公式</h6>
                                        <div class="bg-white p-2 border rounded" id="formula">
                                            <code></code>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-muted">
                        <small>
                            <strong>政策依据：</strong>《中华人民共和国车辆购置税法》<br>
                            <strong>注：</strong>进口车辆计税价格 = 关税完税价格 + 关税 + 消费税
                        </small>
                    </div>
                </div>

                <!-- 知识库组件 -->
                <div id="knowledgeBaseContainer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../common/components/knowledge-base.js"></script>
    <script src="script.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const kbContainer = document.getElementById('knowledgeBaseContainer');
        if (kbContainer && typeof KnowledgeBase !== 'undefined') {
          new KnowledgeBase(kbContainer, {
            knowledgePath: './车辆购置税知识库/',
            items: [
              { title: '车辆购置税基础知识', file: '1_车辆购置税基础知识.md' },
              { title: '车辆购置税税率', file: '2_车辆购置税税率.md' },
              { title: '车辆购置税规定', file: '3_车辆购置税规定.md' },
              { title: '车辆购置税计算方法', file: '4_车辆购置税计算方法.md' }
            ]
          });
        }
      });
    </script>
</body>
</html>
