<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源税计算器 - 财税小工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../common/components/knowledge-base.css">
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-brown text-white">
                        <h4 class="mb-0">资源税计算器</h4>
                        <small>版本：2026.03-001 | 生效日期：2020-09-01</small>
                    </div>
                    <div class="card-body">
                        <form id="resourceTaxForm">
                            <div class="mb-3">
                                <label class="form-label">资源类型 <span class="text-danger">*</span></label>
                                <select class="form-select" id="resourceType" required>
                                    <option value="">请选择</option>
                                    <optgroup label="能源矿产">
                                        <option value="crude_oil">原油（6-30元/吨）</option>
                                        <option value="natural_gas">天然气（2-15元/千立方米）</option>
                                        <option value="coal">煤炭（2-20元/吨）</option>
                                        <option value="other_coal">其他煤炭（0.3-5元/吨）</option>
                                    </optgroup>
                                    <optgroup label="金属矿产">
                                        <option value="iron_ore">铁矿（5-25元/吨）</option>
                                        <option value="gold_ore">金矿（2-10元/吨）</option>
                                        <option value="copper_ore">铜矿（3-15元/吨）</option>
                                        <option value="aluminum_ore">铝土矿（3-20元/吨）</option>
                                        <option value="rare_earth">稀土（7.5-30元/吨）</option>
                                        <option value="other_metal">其他有色金属矿（2-20元/吨）</option>
                                    </optgroup>
                                    <optgroup label="非金属矿产">
                                        <option value="salt">盐（2-10元/吨）</option>
                                        <option value="limestone">石灰石（1-10元/吨）</option>
                                        <option value="clay">粘土、砂石（0.1-5元/吨或立方米）</option>
                                        <option value="granite">花岗岩（3-15元/立方米）</option>
                                        <option value="marble">大理石（3-15元/立方米）</option>
                                        <option value="other_nonmetal">其他非金属矿（0.5-20元/吨或立方米）</option>
                                    </optgroup>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">销售/开采数量 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="quantity" placeholder="请输入数量" min="0" step="0.01" required>
                                    <select class="form-select" id="unit" style="max-width: 120px;">
                                        <option value="ton">吨</option>
                                        <option value="cubic">立方米</option>
                                        <option value="thousand_cubic">千立方米</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">适用税额（元） <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="taxRate" placeholder="请输入当地适用税额" min="0" step="0.1" required>
                                <small class="text-muted">各省可在幅度内确定具体税额，请查询当地税务机关</small>
                            </div>

                            <button type="submit" class="btn btn-brown w-100">计算资源税</button>
                        </form>

                        <div id="result" class="mt-4 d-none">
                            <div class="card bg-light">
                                <div class="card-header">
                                    <h5 class="mb-0">计算结果</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table table-bordered">
                                        <tbody>
                                            <tr>
                                                <th width="40%">资源类型</th>
                                                <td id="resultType">-</td>
                                            </tr>
                                            <tr>
                                                <th>销售/开采数量</th>
                                                <td id="resultQuantity">-</td>
                                            </tr>
                                            <tr>
                                                <th>适用税额</th>
                                                <td id="resultRate">-</td>
                                            </tr>
                                            <tr>
                                                <th>应纳资源税</th>
                                                <td id="resultTax" class="text-danger fw-bold">-</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <div class="mt-3">
                                        <h6>计算公式</h6>
                                        <div class="bg-white p-2 border rounded" id="formula">
                                            <code></code>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-muted">
                        <small>
                            <strong>政策依据：</strong>《中华人民共和国资源税法》<br>
                            <strong>注：</strong>开采共伴生矿、低品位矿可按规定减征资源税
                        </small>
                    </div>
                </div>

                <!-- 知识库组件 -->
                <div id="knowledgeBaseContainer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../common/components/knowledge-base.js"></script>
    <script src="script.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const kbContainer = document.getElementById('knowledgeBaseContainer');
        if (kbContainer && typeof KnowledgeBase !== 'undefined') {
          new KnowledgeBase(kbContainer, {
            knowledgePath: './资源税知识库/',
            items: [
              { title: '资源税基础知识', file: '1_资源税基础知识.md' },
              { title: '资源税税率', file: '2_资源税税率.md' },
              { title: '资源税规定', file: '3_资源税规定.md' },
              { title: '资源税计算方法', file: '4_资源税计算方法.md' }
            ]
          });
        }
      });
    </script>
</body>
</html>
